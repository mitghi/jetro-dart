# Build cdylib for every supported target and attach to the GitHub
# Release matching the tag (`vX.Y.Z`). Triggered when a tag of that
# shape is pushed. The release artifact naming convention must match
# what `hook/build.dart` expects:
#
#   jetro_dart-v<version>-<target-triple>-<libfile>
#
# e.g. jetro_dart-v0.1.0-aarch64-apple-darwin-libjetro_dart.dylib

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            libfile: libjetro_dart.dylib
          - target: x86_64-apple-darwin
            runner: macos-14
            libfile: libjetro_dart.dylib
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            libfile: libjetro_dart.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            libfile: libjetro_dart.so
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            libfile: jetro_dart.dll
          - target: aarch64-linux-android
            runner: ubuntu-latest
            libfile: libjetro_dart.so
            ndk: true
            ndk_arch: arm64-v8a
          - target: armv7-linux-androideabi
            runner: ubuntu-latest
            libfile: libjetro_dart.so
            ndk: true
            ndk_arch: armeabi-v7a
          - target: x86_64-linux-android
            runner: ubuntu-latest
            libfile: libjetro_dart.so
            ndk: true
            ndk_arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install cargo-ndk (Android)
        if: matrix.ndk == true
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Build (cargo)
        if: matrix.cross != true && matrix.ndk != true
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --manifest-path rust/Cargo.toml

      - name: Build (cross)
        if: matrix.cross == true
        shell: bash
        run: |
          cross build --release --target ${{ matrix.target }} \
            --manifest-path rust/Cargo.toml

      - name: Build (cargo-ndk, Android)
        if: matrix.ndk == true
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_ROOT:-$ANDROID_NDK_LATEST_HOME}"
          echo "Using NDK at: $ANDROID_NDK_HOME"
          cargo ndk --target ${{ matrix.ndk_arch }} \
            --platform 24 \
            --manifest-path rust/Cargo.toml \
            -- build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="jetro_dart-v${version}-${{ matrix.target }}-${{ matrix.libfile }}"
          src="target/${{ matrix.target }}/release/${{ matrix.libfile }}"
          mkdir -p dist
          cp "$src" "dist/$asset"
          echo "ASSET=dist/$asset" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
