name: jetro_dart
description: >-
  Dart and Flutter bindings for jetro, a compact JSON query and
  transformation engine. Ships as a Native Assets package: prebuilt
  cdylib downloaded at install for common targets, falls back to
  cargo build from source.
version: 0.1.1
homepage: https://github.com/mitghi/jetro-dart
repository: https://github.com/mitghi/jetro-dart
issue_tracker: https://github.com/mitghi/jetro-dart/issues
topics:
  - json
  - query
  - jetro
  - jsonpath
  - jsonata

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  ffi: ^2.1.0
  hooks: ^1.0.0
  code_assets: ^1.0.0

dev_dependencies:
  jsonata_dart: ^0.3.3
  lints: ^5.0.0
  test: ^1.24.0
