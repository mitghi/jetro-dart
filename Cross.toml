# cross-rs configuration. Pins Android targets to images with NDK r25b
# (clang 14, API 24) so C-heavy deps (croaring, simd-json autoinstall
# routines) link cleanly. Linux aarch64 image bumped to match.

[build.env]
passthrough = ["RUSTFLAGS", "CARGO_TARGET_DIR"]

[target.aarch64-linux-android]
image = "ghcr.io/cross-rs/aarch64-linux-android:0.2.5"

[target.armv7-linux-androideabi]
image = "ghcr.io/cross-rs/armv7-linux-androideabi:0.2.5"

[target.x86_64-linux-android]
image = "ghcr.io/cross-rs/x86_64-linux-android:0.2.5"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"

[target.aarch64-linux-android.env]
passthrough = ["RUSTFLAGS"]
volumes = []

[env]
ANDROID_PLATFORM_LEVEL = "24"
CC_aarch64_linux_android = "aarch64-linux-android24-clang"
CXX_aarch64_linux_android = "aarch64-linux-android24-clang++"
AR_aarch64_linux_android = "llvm-ar"
CC_armv7_linux_androideabi = "armv7a-linux-androideabi24-clang"
CXX_armv7_linux_androideabi = "armv7a-linux-androideabi24-clang++"
AR_armv7_linux_androideabi = "llvm-ar"
CC_x86_64_linux_android = "x86_64-linux-android24-clang"
CXX_x86_64_linux_android = "x86_64-linux-android24-clang++"
AR_x86_64_linux_android = "llvm-ar"
